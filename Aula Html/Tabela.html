<!--
<table></table> define a tabela
<caption> legenda da tabela
 <tr></tr> adiciona linha na tabela
<th></>adiciona uma celula de cabecalho texto negrito
 <td></td> adiciona uma celula de dado comum alinha a esquerda

 <thead></thead> cabecalho da tabela 
 <tbody></tbody> corpo da tabela 
 <tfoot></tfoot> rodapè da tabela 

-->
 <!DOCTYPE html>
 <html lang="pt-BR">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*Estilo de Tabela*/
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 40px;
        }
        h1{
            font-size: 28px;
        }
        table{
            border-collapse: collapse;
            width: 70%;
            margin-top: 10px;
        }
        caption{
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        th,td{
            border: 1px solid #000;
            padding: 8px 12px;
            text-align: left;
        }
        th{
            background-color: #ec6969;
        }
        tfoot td{
            font-weight: bold;
        }
    </style>
 </head>
 <body>
    <h1>Tabela</h1>
<table>
    <caption>Cadastro de clientes</caption>
    <thead>
        <tr>
            <th>Nome:</th>
            <th>Email:</th>
            <th>Telefone:</th>
            <th>Cargo:</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Lucas</td>
            <td>lucas@email.com</td>
            <td>(11)73653866</td>
            <td>Desenvolvedor Web</td>
        </tr>
        <tr>
         <td>Lucas</td>
            <td>lucas@email.com</td>
            <td>(11)73653866</td>
            <td>Desenvolvedor Web</td>
    
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td colspan="3"></td>
            <td>Total 2</td>
        </tr>
    </tfoot>
</table>
    
 </body>
 </html>
